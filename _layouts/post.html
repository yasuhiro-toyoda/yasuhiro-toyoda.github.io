---
layout: default
---
<article class="post-layout blog-post wrap prose">
  <header class="post-header blog-post__header">
    <p class="eyebrow">{{ page.category }}</p>
    <h1>{{ page.title }}</h1>
    {% include tag-list.html tags=page.tags link_to_blog=true %}
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%-m月%-d日" }}</time>
      <span>・</span>
      <span>{{ site.title }}</span>
    </p>
    {% if page.excerpt %}
      <p class="post-lead">{{ page.excerpt }}</p>
    {% endif %}
  </header>

  <div class="post-body blog-post__body">
    {{ content }}
  </div>

  <nav class="blog-post__footer" aria-label="次の導線">
    <h2>次の導線</h2>
    <ul class="blog-post__footer-links">
      <li><a href="{{ '/blog/' | relative_url }}">記事一覧を見る</a></li>
      <li><a href="{{ '/apps/' | relative_url }}">アプリ一覧を見る</a></li>
      <li><a href="{{ '/contact/' | relative_url }}">問い合わせる</a></li>
    </ul>
  </nav>
</article>
