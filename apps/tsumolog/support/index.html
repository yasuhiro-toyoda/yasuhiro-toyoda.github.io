<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ツモログ サポート | Musashi Studio</title>
  <meta
    name="description"
    content="ツモログのサポートページです。お問い合わせ方法、返信目安、関連情報を掲載しています。"
  />
  <style>
    :root {
      --bg: #f5f1e8;
      --surface: #fffdf8;
      --text: #23313a;
      --muted: #5a6a73;
      --line: #d6c8b2;
      --accent: #225b52;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
      line-height: 1.8;
      color: var(--text);
      background: linear-gradient(180deg, #f7f3ea 0%, var(--bg) 100%);
    }

    a {
      color: var(--accent);
    }

    .container {
      width: min(calc(100% - 32px), 760px);
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(35, 49, 58, 0.08);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 12px;
    }

    h2 {
      font-size: 1.2rem;
      margin: 32px 0 12px;
    }

    p {
      margin: 0 0 16px;
    }

    ul {
      padding-left: 1.2em;
      margin: 0 0 16px;
    }

    li {
      margin-bottom: 8px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
    }

    .button,
    .button-secondary {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .button {
      background: var(--accent);
      color: #fff;
    }

    .button-secondary {
      background: #e4efe9;
      color: var(--accent);
    }

    footer {
      margin-top: 32px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="eyebrow">Tsumolog Support</p>
      <h1>ツモログ サポート</h1>
      <p>
        ツモログに関する不具合報告、ご質問、ご要望の窓口です。問い合わせはサイト共通のフォームに集約しています。
      </p>

      <div class="button-row">
        <a
          class="button"
          href="https://docs.google.com/forms/d/e/1FAIpQLSf5aODfbNoWymvjIaQoXQCO5uHjFp6NLFmtFUL4-KHUyBjfzQ/viewform?usp=header"
          target="_blank"
          rel="noopener noreferrer"
        >
          お問い合わせフォームを開く
        </a>
        <a class="button-secondary" href="/contact/">サイトのお問い合わせページ</a>
      </div>

      <h2>返信について</h2>
      <p>
        原則として数日以内の確認を目安にしていますが、内容や状況によっては回答まで時間をいただく場合があります。
      </p>

      <h2>関連リンク</h2>
      <ul>
        <li><a href="/apps/tsumolog/">ツモログ紹介ページ</a></li>
        <li><a href="/apps/tsumolog/privacy/">ツモログ プライバシーポリシー</a></li>
        <li><a href="/apps/">アプリ一覧</a></li>
        <li><a href="/">Musashi Studio トップ</a></li>
      </ul>

      <footer>
        <p>運営者: Yasuhiro Toyoda / Musashi Studio</p>
      </footer>
    </section>
  </main>
</body>
</html>
